name: MainDistributionPipeline

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build against DuckDB stable (v1.5.0) — every push
  # ---------------------------------------------------------------------------
  duckdb-stable-build:
    name: Build (DuckDB v1.5.0 — Variegata)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: keboola
      enable_rust: false

  # ---------------------------------------------------------------------------
  # Build against DuckDB main (nightly) — every push
  # ---------------------------------------------------------------------------
  duckdb-next-build:
    name: Build (DuckDB main)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: keboola
      enable_rust: false

  # ---------------------------------------------------------------------------
  # E2E live tests — every push
  #
  # Runs identically to local: no -n (sequential), no --timeout override.
  # Timeout defaults come from test/e2e/pyproject.toml (120s global,
  # 300s for slow tests via @pytest.mark.timeout).
  # Tests skip automatically when KEBOOLA_TOKEN secret is not set.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E tests
    needs: duckdb-stable-build
    runs-on: ubuntu-latest

    env:
      KEBOOLA_TOKEN: ${{ secrets.KEBOOLA_TOKEN }}
      KEBOOLA_URL: ${{ secrets.KEBOOLA_URL || 'https://connection.keboola.com' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download linux_amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: keboola-v1.5.0-extension-linux_amd64
          path: artifacts/

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python test dependencies
        run: uv sync
        working-directory: test/e2e

      - name: Run E2E pytest suite
        working-directory: test/e2e
        # Same command as local: pytest . -v
        # pyproject.toml adds: -x --tb=short timeout=120
        # @pytest.mark.timeout(300) overrides for slow tests
        run: |
          uv run pytest . -m live -v \
            --junitxml=${{ github.workspace }}/test-results/e2e.xml
        env:
          KEBOOLA_TOKEN: ${{ env.KEBOOLA_TOKEN }}
          KEBOOLA_URL: ${{ env.KEBOOLA_URL }}
          KEBOOLA_EXTENSION_PATH: ${{ github.workspace }}/artifacts/keboola.duckdb_extension

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Community extension release — tag pushes only, blocked by build + E2E
  # ---------------------------------------------------------------------------
  community-release:
    name: Community Extension Release
    needs:
      - duckdb-stable-build
      - e2e
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download all stable build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "keboola-v1.5.0-extension-*"
          path: artifacts/stable/
          merge-multiple: false

      - name: Deploy to S3 (stable)
        if: env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          DUCKDB_EXTENSION_SIGNING_PK: ${{ secrets.DUCKDB_EXTENSION_SIGNING_PK }}
          BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          TAG: ${{ github.ref_name }}
        run: |
          pip install awscli
          for platform_dir in artifacts/stable/*/; do
            platform=$(basename "$platform_dir")
            for ext in "$platform_dir"*.duckdb_extension; do
              [ -f "$ext" ] || continue
              s3_key="keboola/v1.5.0/${platform}/keboola.duckdb_extension"
              aws s3 cp "$ext" "s3://${BUCKET_NAME}/${s3_key}" --acl public-read || true
            done
          done

      - name: Rename artifacts with platform suffix
        run: |
          mkdir -p artifacts/release
          for platform_dir in artifacts/stable/*/; do
            platform=$(basename "$platform_dir")
            for f in "$platform_dir"*; do
              [ -f "$f" ] || continue
              filename=$(basename "$f")
              ext="${filename##*.}"
              base="${filename%.*}"
              cp "$f" "artifacts/release/${base}-${platform}.${ext}"
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Keboola DuckDB Extension ${{ github.ref_name }}"
          body: |
            ## Keboola DuckDB Extension ${{ github.ref_name }}

            Install from DuckDB:
            ```sql
            INSTALL keboola FROM community;
            LOAD keboola;
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
          generate_release_notes: true
          files: |
            artifacts/release/*
