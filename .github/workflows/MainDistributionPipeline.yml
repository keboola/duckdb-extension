name: MainDistributionPipeline

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build against DuckDB stable (v1.5.0)
  # ---------------------------------------------------------------------------
  duckdb-stable-build:
    name: Build (DuckDB v1.5.0 — Variegata)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: keboola
      enable_rust: false

  # ---------------------------------------------------------------------------
  # Build against DuckDB main (nightly)
  # ---------------------------------------------------------------------------
  duckdb-next-build:
    name: Build (DuckDB main)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: keboola
      enable_rust: false

  # ---------------------------------------------------------------------------
  # Fast linux_amd64 build for E2E gate — starts immediately on tag push,
  # finishes before Windows/WASM so e2e-gate can start sooner.
  # ---------------------------------------------------------------------------
  e2e-linux-build:
    name: Build linux_amd64 for E2E
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build libssl-dev pkg-config unzip curl

      - name: Build extension
        run: make release

      - name: Upload E2E artifact
        uses: actions/upload-artifact@v4
        with:
          name: keboola-e2e-linux_amd64
          path: build/release/extension/keboola/keboola.duckdb_extension
          retention-days: 3

  # ---------------------------------------------------------------------------
  # E2E live tests — run on tag pushes as a release gate.
  # Waits only for the fast linux build (not all platforms).
  # Requires KEBOOLA_TOKEN and KEBOOLA_URL secrets to be configured.
  # community-release will NOT proceed if this job fails.
  # ---------------------------------------------------------------------------
  e2e-gate:
    name: E2E release gate
    needs: e2e-linux-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    env:
      KEBOOLA_TOKEN: ${{ secrets.KEBOOLA_TOKEN }}
      KEBOOLA_URL: ${{ secrets.KEBOOLA_URL || 'https://connection.keboola.com' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download linux_amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: keboola-e2e-linux_amd64
          path: artifacts/

      - name: Check credentials are available
        run: |
          if [ -z "${KEBOOLA_TOKEN}" ]; then
            echo "ERROR: KEBOOLA_TOKEN secret is not set — cannot run E2E gate."
            echo "Add it in: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python test dependencies
        run: uv sync
        working-directory: test/e2e

      - name: Run E2E pytest suite
        working-directory: test/e2e
        run: |
          uv run pytest . \
            -m live \
            -n 4 \
            --timeout=120 \
            -v \
            --tb=short \
            --junitxml=${{ github.workspace }}/test-results/e2e-gate.xml
        env:
          KEBOOLA_TOKEN: ${{ env.KEBOOLA_TOKEN }}
          KEBOOLA_URL: ${{ env.KEBOOLA_URL }}
          KEBOOLA_EXTENSION_PATH: ${{ github.workspace }}/artifacts/keboola.duckdb_extension

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-gate-results
          path: test-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Community extension release — fires only on version tag pushes
  # Blocked until build + E2E gate both pass.
  # ---------------------------------------------------------------------------
  community-release:
    name: Community Extension Release
    needs:
      - duckdb-stable-build
      - e2e-gate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Download all platform artifacts for the stable build
      - name: Download all stable build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "keboola-v1.5.0-extension-*"
          path: artifacts/stable/
          merge-multiple: false

      # Upload to S3 via the duckdb extension distribution mechanism
      - name: Deploy to S3 (stable)
        if: env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          DUCKDB_EXTENSION_SIGNING_PK: ${{ secrets.DUCKDB_EXTENSION_SIGNING_PK }}
          BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          TAG: ${{ github.ref_name }}
        run: |
          pip install awscli
          for platform_dir in artifacts/stable/*/; do
            platform=$(basename "$platform_dir")
            for ext in "$platform_dir"*.duckdb_extension; do
              [ -f "$ext" ] || continue
              s3_key="keboola/v1.5.0/${platform}/keboola.duckdb_extension"
              aws s3 cp "$ext" "s3://${BUCKET_NAME}/${s3_key}" --acl public-read || true
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Keboola DuckDB Extension ${{ github.ref_name }}"
          body: |
            ## Keboola DuckDB Extension ${{ github.ref_name }}

            Install from DuckDB:
            ```sql
            INSTALL keboola FROM community;
            LOAD keboola;
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
          generate_release_notes: true
          files: |
            artifacts/stable/**/*
